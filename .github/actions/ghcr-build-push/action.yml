name: GHCR Build And Push
description: Build the production Moodle image and push it to GitHub Container Registry.

inputs:
  image_repository:
    description: Full GHCR image repository, for example ghcr.io/hardikidea/elearnmindset.
    required: true
  moodle_version:
    description: Moodle Git tag to bake into the image.
    required: true
  image_tag:
    description: Image tag to publish.
    required: true

runs:
  using: composite
  steps:
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push production image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/moodle/Dockerfile
        push: true
        build-args: |
          INCLUDE_MOODLE_SOURCE=true
          MOODLE_VERSION=${{ inputs.moodle_version }}
        tags: |
          ${{ inputs.image_repository }}:${{ inputs.image_tag }}
