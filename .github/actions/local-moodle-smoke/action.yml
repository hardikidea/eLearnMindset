name: Local Moodle Smoke Test
description: Build and install the local Docker Moodle stack, then verify the primary pages.

runs:
  using: composite
  steps:
    - name: Create ENV file
      shell: bash
      run: cp .env.example .env

    - name: Bootstrap Moodle source
      shell: bash
      run: ./scripts/bootstrap-moodle.sh

    - name: Build local Docker images
      shell: bash
      run: docker compose build

    - name: Install Moodle and start services
      shell: bash
      run: ./scripts/install-site.sh

    - name: Check service status
      shell: bash
      run: docker compose ps

    - name: Check Moodle home page
      shell: bash
      run: |
        set -euo pipefail
        curl -fsS --max-time 30 "http://localhost:${MOODLE_HTTP_PORT}/" >/tmp/moodle-home.html
        grep -q "eLearn Mindset Local" /tmp/moodle-home.html

    - name: Check Moodle login page
      shell: bash
      run: curl -fsS --max-time 30 "http://localhost:${MOODLE_HTTP_PORT}/login/index.php" >/tmp/moodle-login.html

    - name: Confirm installed Moodle release
      shell: bash
      run: docker compose exec -T moodle php admin/cli/cfg.php --name=release

    - name: Dump logs on failure
      if: failure()
      shell: bash
      run: docker compose logs --no-color

    - name: Stop services
      if: always()
      shell: bash
      run: docker compose down -v
