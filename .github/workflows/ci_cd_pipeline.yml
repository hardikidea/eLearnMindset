name: Moodle Delivery Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      publish_image:
        description: "Build and publish the production image to GHCR"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      apply_infrastructure:
        description: "Apply Terraform after planning"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      target_environment:
        description: "Environment to apply when apply_infrastructure is true"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod
          - all
      run_extended_tests:
        description: "Run optional Behat and PHPUnit integration placeholders"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read
  pull-requests: read
  packages: write
  checks: write

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  PROJECT_NAME: elearn-mindset
  GHCR_IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME || 'ghcr.io/hardikidea/elearnmindset' }}
  MOODLE_VERSION: v5.2.1
  TRIVY_VERSION: v0.71.2
  RENOVATE_CLI_VERSION: 43.243.0

jobs:
  change_eligibility:
    name: Change Eligibility Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Evaluate ref eligibility
        id: gate
        uses: ./.github/actions/change-eligibility

  source_integrity:
    name: Moodle Source Integrity
    runs-on: ubuntu-latest
    needs: change_eligibility
    if: needs.change_eligibility.outputs.should_run == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Moodle source integrity
        uses: ./.github/actions/moodle-source-integrity
        with:
          moodle_version: ${{ env.MOODLE_VERSION }}

  static_quality:
    name: Static Quality Gate
    runs-on: ubuntu-latest
    needs: change_eligibility
    if: needs.change_eligibility.outputs.should_run == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run static quality checks
        uses: ./.github/actions/static-quality-gate
        with:
          renovate_cli_version: ${{ env.RENOVATE_CLI_VERSION }}

  documentation_quality:
    name: Documentation Quality Gate
    runs-on: ubuntu-latest
    needs: change_eligibility
    if: needs.change_eligibility.outputs.should_run == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate documentation
        uses: ./.github/actions/documentation-quality-gate

  supply_chain_security:
    name: Supply Chain Security Gate
    runs-on: ubuntu-latest
    needs: [change_eligibility, source_integrity, static_quality]
    if: needs.change_eligibility.outputs.should_run == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run dependency and IaC security checks
        uses: ./.github/actions/supply-chain-security
        with:
          trivy_version: ${{ env.TRIVY_VERSION }}

  application_image_ci:
    name: Application Image Build And Scan
    runs-on: ubuntu-latest
    needs: [change_eligibility, source_integrity, static_quality, supply_chain_security]
    if: needs.change_eligibility.outputs.should_run == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create ENV file
        run: cp .env.example .env

      - name: Bootstrap Moodle source
        run: ./scripts/bootstrap-moodle.sh

      - name: Build local Docker image
        run: docker compose build

      - name: Build and scan production image
        uses: ./.github/actions/moodle-image-build
        with:
          image_name: elearn-mindset-production:${{ github.sha }}
          moodle_version: ${{ env.MOODLE_VERSION }}
          scan_image: "true"
          trivy_version: ${{ env.TRIVY_VERSION }}

  worker_image_ci:
    name: Worker Image Build
    runs-on: ubuntu-latest
    needs: [change_eligibility, source_integrity, static_quality, supply_chain_security]
    if: needs.change_eligibility.outputs.should_run == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build cron-compatible worker image
        uses: ./.github/actions/moodle-image-build
        with:
          image_name: elearn-mindset-worker:${{ github.sha }}
          moodle_version: ${{ env.MOODLE_VERSION }}

  local_integration_smoke:
    name: Local Integration Smoke Test
    runs-on: ubuntu-latest
    needs: [change_eligibility, application_image_ci, worker_image_ci]
    if: needs.change_eligibility.outputs.should_run == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run local Moodle smoke test
        uses: ./.github/actions/local-moodle-smoke

  release_metadata:
    name: Release Image Metadata
    runs-on: ubuntu-latest
    needs: change_eligibility
    if: needs.change_eligibility.outputs.should_run == 'true'
    outputs:
      image: ${{ steps.metadata.outputs.image }}
      tag: ${{ steps.metadata.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute release image metadata
        id: metadata
        uses: ./.github/actions/release-image-metadata
        with:
          image_repository: ${{ env.GHCR_IMAGE_NAME }}

  publish_release_candidate:
    name: Publish Release Candidate Image
    runs-on: ubuntu-latest
    needs: [change_eligibility, release_metadata, local_integration_smoke]
    if: |
      needs.change_eligibility.outputs.should_run == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'workflow_dispatch' || inputs.publish_image == 'true')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and push GHCR image
        uses: ./.github/actions/ghcr-build-push
        with:
          image_repository: ${{ env.GHCR_IMAGE_NAME }}
          moodle_version: ${{ env.MOODLE_VERSION }}
          image_tag: ${{ needs.release_metadata.outputs.tag }}

  plan_dev_infrastructure:
    name: "[Dev] Infrastructure Plan"
    runs-on: ubuntu-latest
    needs: [change_eligibility, release_metadata, source_integrity, static_quality, documentation_quality, supply_chain_security]
    if: vars.AWS_ACCOUNT_ID != '' && needs.change_eligibility.outputs.should_run == 'true'
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform plan dev
        uses: ./.github/actions/terraform-run
        with:
          environment: dev
          command: plan
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          container_repository_url: ${{ env.GHCR_IMAGE_NAME }}
          image_tag: ${{ needs.release_metadata.outputs.tag }}

  plan_stage_infrastructure:
    name: "[Stage] Infrastructure Plan"
    runs-on: ubuntu-latest
    needs: [change_eligibility, release_metadata, source_integrity, static_quality, documentation_quality, supply_chain_security]
    if: vars.AWS_ACCOUNT_ID != '' && needs.change_eligibility.outputs.should_run == 'true'
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform plan stage
        uses: ./.github/actions/terraform-run
        with:
          environment: stage
          command: plan
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          container_repository_url: ${{ env.GHCR_IMAGE_NAME }}
          image_tag: ${{ needs.release_metadata.outputs.tag }}

  plan_prod_infrastructure:
    name: "[Prod] Infrastructure Plan"
    runs-on: ubuntu-latest
    needs: [change_eligibility, release_metadata, source_integrity, static_quality, documentation_quality, supply_chain_security]
    if: vars.AWS_ACCOUNT_ID != '' && needs.change_eligibility.outputs.should_run == 'true'
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform plan prod
        uses: ./.github/actions/terraform-run
        with:
          environment: prod
          command: plan
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          container_repository_url: ${{ env.GHCR_IMAGE_NAME }}
          image_tag: ${{ needs.release_metadata.outputs.tag }}

  apply_dev_infrastructure:
    name: "[Dev] Infrastructure Apply"
    runs-on: ubuntu-latest
    needs: [release_metadata, plan_dev_infrastructure, publish_release_candidate]
    if: |
      vars.AWS_ACCOUNT_ID != '' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' &&
         inputs.apply_infrastructure == 'true' &&
         (inputs.target_environment == 'dev' || inputs.target_environment == 'all')))
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform apply dev
        uses: ./.github/actions/terraform-run
        with:
          environment: dev
          command: apply
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          container_repository_url: ${{ env.GHCR_IMAGE_NAME }}
          image_tag: ${{ needs.release_metadata.outputs.tag }}

  stabilize_dev_web:
    name: "[Dev] Web Service Stabilization"
    runs-on: ubuntu-latest
    needs: apply_dev_infrastructure
    if: needs.apply_dev_infrastructure.result == 'success'
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for Moodle web service
        uses: ./.github/actions/ecs-service-wait
        with:
          environment: dev
          service_kind: web
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

  stabilize_dev_worker:
    name: "[Dev] Worker Service Stabilization"
    runs-on: ubuntu-latest
    needs: apply_dev_infrastructure
    if: needs.apply_dev_infrastructure.result == 'success'
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for Moodle cron service
        uses: ./.github/actions/ecs-service-wait
        with:
          environment: dev
          service_kind: cron
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

  apply_stage_infrastructure:
    name: "[Stage] Infrastructure Apply"
    runs-on: ubuntu-latest
    needs: [release_metadata, plan_stage_infrastructure, publish_release_candidate]
    if: |
      vars.AWS_ACCOUNT_ID != '' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' &&
         inputs.apply_infrastructure == 'true' &&
         (inputs.target_environment == 'stage' || inputs.target_environment == 'all')))
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform apply stage
        uses: ./.github/actions/terraform-run
        with:
          environment: stage
          command: apply
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          container_repository_url: ${{ env.GHCR_IMAGE_NAME }}
          image_tag: ${{ needs.release_metadata.outputs.tag }}

  stabilize_stage_web:
    name: "[Stage] Web Service Stabilization"
    runs-on: ubuntu-latest
    needs: apply_stage_infrastructure
    if: needs.apply_stage_infrastructure.result == 'success'
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for Moodle web service
        uses: ./.github/actions/ecs-service-wait
        with:
          environment: stage
          service_kind: web
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

  stabilize_stage_worker:
    name: "[Stage] Worker Service Stabilization"
    runs-on: ubuntu-latest
    needs: apply_stage_infrastructure
    if: needs.apply_stage_infrastructure.result == 'success'
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for Moodle cron service
        uses: ./.github/actions/ecs-service-wait
        with:
          environment: stage
          service_kind: cron
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

  provision_behat_environment:
    name: "[Extended] Provision Behat Environment"
    runs-on: ubuntu-latest
    needs: publish_release_candidate
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended_tests == 'true' && needs.publish_release_candidate.result == 'success'
    outputs:
      workspace: ${{ steps.workspace.outputs.workspace }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Behat workspace
        id: workspace
        uses: ./.github/actions/integration-test-workspace
        with:
          suite_name: behat

  provision_phpunit_environment:
    name: "[Extended] Provision PHPUnit Environment"
    runs-on: ubuntu-latest
    needs: publish_release_candidate
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended_tests == 'true' && needs.publish_release_candidate.result == 'success'
    outputs:
      workspace: ${{ steps.workspace.outputs.workspace }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare PHPUnit workspace
        id: workspace
        uses: ./.github/actions/integration-test-workspace
        with:
          suite_name: phpunit

  behat_acceptance_tests:
    name: "[Extended] Behat Acceptance Tests"
    runs-on: ubuntu-latest
    needs: provision_behat_environment
    if: needs.provision_behat_environment.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Publish Behat placeholder report
        uses: ./.github/actions/junit-placeholder
        with:
          suite_name: behat
          testcase_name: infrastructure_not_configured
          skipped_message: Behat infrastructure is not configured in this repository yet.
          artifact_name: behat-test-results-${{ github.run_number }}
          output_dir: test-results/behat

  phpunit_integration_tests:
    name: "[Extended] PHPUnit Integration Tests"
    runs-on: ubuntu-latest
    needs: provision_phpunit_environment
    if: needs.provision_phpunit_environment.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Publish PHPUnit placeholder report
        uses: ./.github/actions/junit-placeholder
        with:
          suite_name: phpunit
          testcase_name: infrastructure_not_configured
          skipped_message: PHPUnit integration infrastructure is not configured in this repository yet.
          artifact_name: phpunit-test-results-${{ github.run_number }}
          output_dir: test-results/phpunit

  publish_behat_report:
    name: "[Extended] Publish Behat Report"
    runs-on: ubuntu-latest
    needs: behat_acceptance_tests
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended_tests == 'true' && needs.behat_acceptance_tests.result == 'success'
    steps:
      - name: Download Behat report
        uses: actions/download-artifact@v4
        with:
          name: behat-test-results-${{ github.run_number }}
          path: test-results/behat

      - name: Summarize Behat report
        run: |
          {
            echo "### Behat report"
            echo ""
            echo "Uploaded artifact: behat-test-results-${GITHUB_RUN_NUMBER}"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish_phpunit_report:
    name: "[Extended] Publish PHPUnit Report"
    runs-on: ubuntu-latest
    needs: phpunit_integration_tests
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended_tests == 'true' && needs.phpunit_integration_tests.result == 'success'
    steps:
      - name: Download PHPUnit report
        uses: actions/download-artifact@v4
        with:
          name: phpunit-test-results-${{ github.run_number }}
          path: test-results/phpunit

      - name: Summarize PHPUnit report
        run: |
          {
            echo "### PHPUnit report"
            echo ""
            echo "Uploaded artifact: phpunit-test-results-${GITHUB_RUN_NUMBER}"
          } >> "${GITHUB_STEP_SUMMARY}"

  teardown_behat_environment:
    name: "[Extended] Teardown Behat Environment"
    runs-on: ubuntu-latest
    needs: [provision_behat_environment, behat_acceptance_tests]
    if: always() && github.event_name == 'workflow_dispatch' && inputs.run_extended_tests == 'true'
    steps:
      - name: Teardown Behat metadata
        run: echo "Teardown complete for ${{ needs.provision_behat_environment.outputs.workspace }}."

  teardown_phpunit_environment:
    name: "[Extended] Teardown PHPUnit Environment"
    runs-on: ubuntu-latest
    needs: [provision_phpunit_environment, phpunit_integration_tests]
    if: always() && github.event_name == 'workflow_dispatch' && inputs.run_extended_tests == 'true'
    steps:
      - name: Teardown PHPUnit metadata
        run: echo "Teardown complete for ${{ needs.provision_phpunit_environment.outputs.workspace }}."

  stage_smoke_validation:
    name: "[Stage] Smoke Validation"
    runs-on: ubuntu-latest
    needs: [stabilize_stage_web, stabilize_stage_worker]
    if: needs.stabilize_stage_web.result == 'success' && needs.stabilize_stage_worker.result == 'success'
    environment: stage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Smoke-test stage Moodle
        uses: ./.github/actions/remote-moodle-smoke
        with:
          environment: stage
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

  stage_browser_validation:
    name: "[Stage] Browser Validation"
    runs-on: ubuntu-latest
    needs: stage_smoke_validation
    if: needs.stage_smoke_validation.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run browser E2E suite when present
        uses: ./.github/actions/playwright-e2e-if-present

  production_change_approval:
    name: "[Prod] Change Approval"
    runs-on: ubuntu-latest
    needs: [plan_prod_infrastructure, stage_smoke_validation, stage_browser_validation]
    if: |
      always() &&
      vars.AWS_ACCOUNT_ID != '' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' &&
         inputs.apply_infrastructure == 'true' &&
         (inputs.target_environment == 'prod' || inputs.target_environment == 'all'))) &&
      needs.plan_prod_infrastructure.result == 'success' &&
      (needs.stage_smoke_validation.result == 'success' || needs.stage_smoke_validation.result == 'skipped') &&
      (needs.stage_browser_validation.result == 'success' || needs.stage_browser_validation.result == 'skipped')
    environment: prod-approval
    steps:
      - name: Approval completed
        run: echo "Production approval gate completed."

  apply_prod_infrastructure:
    name: "[Prod] Infrastructure Apply"
    runs-on: ubuntu-latest
    needs: [release_metadata, production_change_approval, publish_release_candidate]
    if: needs.production_change_approval.result == 'success'
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform apply prod
        uses: ./.github/actions/terraform-run
        with:
          environment: prod
          command: apply
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          container_repository_url: ${{ env.GHCR_IMAGE_NAME }}
          image_tag: ${{ needs.release_metadata.outputs.tag }}

  stabilize_prod_web:
    name: "[Prod] Web Service Stabilization"
    runs-on: ubuntu-latest
    needs: apply_prod_infrastructure
    if: needs.apply_prod_infrastructure.result == 'success'
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for Moodle web service
        uses: ./.github/actions/ecs-service-wait
        with:
          environment: prod
          service_kind: web
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

  stabilize_prod_worker:
    name: "[Prod] Worker Service Stabilization"
    runs-on: ubuntu-latest
    needs: apply_prod_infrastructure
    if: needs.apply_prod_infrastructure.result == 'success'
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for Moodle cron service
        uses: ./.github/actions/ecs-service-wait
        with:
          environment: prod
          service_kind: cron
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

  production_smoke_validation:
    name: "[Prod] Smoke Validation"
    runs-on: ubuntu-latest
    needs: [stabilize_prod_web, stabilize_prod_worker]
    if: needs.stabilize_prod_web.result == 'success' && needs.stabilize_prod_worker.result == 'success'
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Smoke-test production Moodle
        uses: ./.github/actions/remote-moodle-smoke
        with:
          environment: prod
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
