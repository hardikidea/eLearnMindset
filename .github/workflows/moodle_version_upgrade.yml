name: Moodle Version Upgrade

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to upgrade"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stage
          - prod
      moodle_version:
        description: "Official Moodle Git tag, for example v5.2.1"
        required: true
        default: v5.2.1
        type: string
      backup_before_upgrade:
        description: "Create RDS and EFS backups before deploying"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_cli_upgrade:
        description: "Run Moodle admin/cli/upgrade.php after deployment"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      backup_vault_name:
        description: "AWS Backup vault name; falls back to BACKUP_VAULT_NAME variable"
        required: false
        default: ""
        type: string
      backup_role_arn:
        description: "AWS Backup IAM role ARN; falls back to BACKUP_ROLE_ARN variable"
        required: false
        default: ""
        type: string
      confirm_upgrade:
        description: "Type UPGRADE dev v5.2.1, UPGRADE stage v5.2.1, or UPGRADE prod v5.2.1"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: moodle-version-upgrade-${{ inputs.target_environment }}
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  PROJECT_NAME: elearn-mindset
  ECR_REPOSITORY: elearn-mindset
  TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
  MOODLE_VERSION: ${{ inputs.moodle_version }}
  IMAGE_TAG: moodle-upgrade-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  upgrade:
    name: Upgrade ${{ inputs.target_environment }} To ${{ inputs.moodle_version }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Upgrade Request
        env:
          CONFIRM_UPGRADE: ${{ inputs.confirm_upgrade }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "Repository variable AWS_ACCOUNT_ID is required." >&2
            exit 1
          fi

          EXPECTED="UPGRADE ${TARGET_ENVIRONMENT} ${MOODLE_VERSION}"
          if [ "${CONFIRM_UPGRADE}" != "${EXPECTED}" ]; then
            echo "Confirmation must exactly match: ${EXPECTED}" >&2
            exit 1
          fi

          if ! [[ "${MOODLE_VERSION}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Moodle version must be an official-looking tag such as v5.2.1." >&2
            exit 1
          fi

          git ls-remote --exit-code --tags --refs \
            https://github.com/moodle/moodle.git \
            "${MOODLE_VERSION}" >/dev/null

      - name: Configure AWS OIDC
        uses: ./.github/actions/aws-oidc
        with:
          environment: ${{ inputs.target_environment }}
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Session Manager Plugin
        if: inputs.run_cli_upgrade == 'true'
        run: |
          set -euo pipefail

          curl -fsSL \
            https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb
          session-manager-plugin --version

      - name: Resolve Environment
        run: |
          set -euo pipefail

          ENV_DIR="terraform/envs/${TARGET_ENVIRONMENT}"
          terraform -chdir="${ENV_DIR}" init \
            -backend-config="bucket=${PROJECT_NAME}-${AWS_ACCOUNT_ID}-${AWS_REGION}-tfstate" \
            -backend-config="dynamodb_table=${PROJECT_NAME}-terraform-locks" \
            -backend-config="key=${PROJECT_NAME}/${TARGET_ENVIRONMENT}.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

          CLUSTER="$(
            terraform -chdir="${ENV_DIR}" output -raw ecs_cluster_name 2>/dev/null ||
              echo "${PROJECT_NAME}-${TARGET_ENVIRONMENT}-cluster"
          )"
          SERVICE="$(
            terraform -chdir="${ENV_DIR}" output -raw ecs_service_name 2>/dev/null ||
              echo "${PROJECT_NAME}-${TARGET_ENVIRONMENT}-service"
          )"
          CRON_SERVICE="$(
            terraform -chdir="${ENV_DIR}" output -raw ecs_cron_service_name 2>/dev/null ||
              echo "${PROJECT_NAME}-${TARGET_ENVIRONMENT}-cron"
          )"
          EFS_ID="$(terraform -chdir="${ENV_DIR}" output -raw efs_file_system_id 2>/dev/null || true)"
          MOODLE_WWWROOT="$(terraform -chdir="${ENV_DIR}" output -raw moodle_wwwroot 2>/dev/null || true)"
          PREVIOUS_TASK_DEFINITION="$(
            aws ecs describe-services \
              --cluster "${CLUSTER}" \
              --services "${SERVICE}" \
              --query 'services[0].taskDefinition' \
              --output text
          )"

          {
            echo "CLUSTER=${CLUSTER}"
            echo "SERVICE=${SERVICE}"
            echo "CRON_SERVICE=${CRON_SERVICE}"
            echo "EFS_ID=${EFS_ID}"
            echo "MOODLE_WWWROOT=${MOODLE_WWWROOT}"
            echo "PREVIOUS_TASK_DEFINITION=${PREVIOUS_TASK_DEFINITION}"
          } >> "${GITHUB_ENV}"

      - name: Create Server Backup
        if: inputs.backup_before_upgrade == 'true'
        env:
          BACKUP_ROLE_ARN_INPUT: ${{ inputs.backup_role_arn }}
          BACKUP_ROLE_ARN_VAR: ${{ vars.BACKUP_ROLE_ARN }}
          BACKUP_VAULT_NAME_INPUT: ${{ inputs.backup_vault_name }}
          BACKUP_VAULT_NAME_VAR: ${{ vars.BACKUP_VAULT_NAME }}
        run: |
          set -euo pipefail

          BACKUP_VAULT_NAME="${BACKUP_VAULT_NAME_INPUT:-${BACKUP_VAULT_NAME_VAR:-}}"
          BACKUP_ROLE_ARN="${BACKUP_ROLE_ARN_INPUT:-${BACKUP_ROLE_ARN_VAR:-}}"

          if [ -z "${BACKUP_VAULT_NAME}" ]; then
            echo "Set BACKUP_VAULT_NAME as an input or repository variable." >&2
            exit 1
          fi

          if [ -z "${BACKUP_ROLE_ARN}" ]; then
            echo "Set BACKUP_ROLE_ARN as an input or repository variable." >&2
            exit 1
          fi

          if [ -z "${EFS_ID}" ] || [ "${EFS_ID}" = "None" ]; then
            EFS_ID="$(
              aws efs describe-file-systems \
                --query "FileSystems[?Tags[?Key=='Name' && Value=='${PROJECT_NAME}-${TARGET_ENVIRONMENT}-moodledata']].FileSystemId | [0]" \
                --output text
            )"
          fi

          if [ -z "${EFS_ID}" ] || [ "${EFS_ID}" = "None" ]; then
            echo "Could not resolve EFS file system for ${TARGET_ENVIRONMENT}." >&2
            exit 1
          fi

          DB_INSTANCE="${PROJECT_NAME}-${TARGET_ENVIRONMENT}-postgres"
          DB_SNAPSHOT="${PROJECT_NAME}-${TARGET_ENVIRONMENT}-upgrade-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          EFS_ARN="arn:aws:elasticfilesystem:${AWS_REGION}:${AWS_ACCOUNT_ID}:file-system/${EFS_ID}"

          aws rds create-db-snapshot \
            --db-instance-identifier "${DB_INSTANCE}" \
            --db-snapshot-identifier "${DB_SNAPSHOT}"

          aws rds wait db-snapshot-available \
            --db-snapshot-identifier "${DB_SNAPSHOT}"

          EFS_BACKUP_JOB_ID="$(
            aws backup start-backup-job \
              --backup-vault-name "${BACKUP_VAULT_NAME}" \
              --resource-arn "${EFS_ARN}" \
              --iam-role-arn "${BACKUP_ROLE_ARN}" \
              --idempotency-token "${PROJECT_NAME}-${TARGET_ENVIRONMENT}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --query BackupJobId \
              --output text
          )"

          while true; do
            STATUS="$(
              aws backup describe-backup-job \
                --backup-job-id "${EFS_BACKUP_JOB_ID}" \
                --query State \
                --output text
            )"
            echo "EFS backup status: ${STATUS}"

            case "${STATUS}" in
              COMPLETED)
                break
                ;;
              ABORTED|FAILED|EXPIRED)
                exit 1
                ;;
            esac

            sleep 30
          done

          {
            echo "BACKUP_VAULT_NAME=${BACKUP_VAULT_NAME}"
            echo "DB_INSTANCE=${DB_INSTANCE}"
            echo "DB_SNAPSHOT=${DB_SNAPSHOT}"
            echo "EFS_BACKUP_JOB_ID=${EFS_BACKUP_JOB_ID}"
          } >> "${GITHUB_ENV}"

      - name: Pause Cron Before Upgrade
        if: inputs.run_cli_upgrade == 'true'
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${CRON_SERVICE}" \
            --desired-count 0

      - name: Enable Maintenance Mode
        if: inputs.run_cli_upgrade == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail

          TASK_ARN="$(
            aws ecs list-tasks \
              --cluster "${CLUSTER}" \
              --service-name "${SERVICE}" \
              --desired-status RUNNING \
              --query 'taskArns[0]' \
              --output text
          )"

          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "None" ]; then
            echo "No running Moodle task found for maintenance mode."
            exit 0
          fi

          aws ecs execute-command \
            --cluster "${CLUSTER}" \
            --task "${TASK_ARN}" \
            --container moodle \
            --interactive \
            --command 'php admin/cli/maintenance.php --enable'

      - name: Build And Push Moodle Image
        uses: ./.github/actions/ecr-build-push
        with:
          environment: ${{ inputs.target_environment }}
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          ecr_repository: ${{ env.ECR_REPOSITORY }}
          moodle_version: ${{ inputs.moodle_version }}
          image_tag: ${{ env.IMAGE_TAG }}

      - name: Deploy Moodle Image With Cron Paused
        if: inputs.run_cli_upgrade == 'true'
        uses: ./.github/actions/terraform-run
        with:
          environment: ${{ inputs.target_environment }}
          command: apply
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          image_tag: ${{ env.IMAGE_TAG }}
          cron_desired_count: "0"

      - name: Deploy Moodle Image
        if: inputs.run_cli_upgrade != 'true'
        uses: ./.github/actions/terraform-run
        with:
          environment: ${{ inputs.target_environment }}
          command: apply
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          image_tag: ${{ env.IMAGE_TAG }}
          cron_desired_count: "1"

      - name: Wait For Moodle Service
        run: |
          set -euo pipefail

          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}"

      - name: Run Moodle CLI Upgrade
        id: cli_upgrade
        if: inputs.run_cli_upgrade == 'true'
        run: |
          set -euo pipefail

          TASK_ARN="$(
            aws ecs list-tasks \
              --cluster "${CLUSTER}" \
              --service-name "${SERVICE}" \
              --desired-status RUNNING \
              --query 'taskArns[0]' \
              --output text
          )"

          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "None" ]; then
            echo "No running Moodle task found after deployment." >&2
            exit 1
          fi

          aws ecs execute-command \
            --cluster "${CLUSTER}" \
            --task "${TASK_ARN}" \
            --container moodle \
            --interactive \
            --command 'php admin/cli/upgrade.php --non-interactive'

          aws ecs execute-command \
            --cluster "${CLUSTER}" \
            --task "${TASK_ARN}" \
            --container moodle \
            --interactive \
            --command 'php admin/cli/purge_caches.php'

          aws ecs execute-command \
            --cluster "${CLUSTER}" \
            --task "${TASK_ARN}" \
            --container moodle \
            --interactive \
            --command 'php admin/cli/maintenance.php --disable'

      - name: Restart Cron In Terraform
        if: inputs.run_cli_upgrade == 'true' && steps.cli_upgrade.outcome == 'success'
        uses: ./.github/actions/terraform-run
        with:
          environment: ${{ inputs.target_environment }}
          command: apply
          aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          aws_region: ${{ env.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
          image_tag: ${{ env.IMAGE_TAG }}
          cron_desired_count: "1"

      - name: Verify Moodle Release
        if: inputs.run_cli_upgrade == 'true' && steps.cli_upgrade.outcome == 'success'
        run: |
          set -euo pipefail

          TASK_ARN="$(
            aws ecs list-tasks \
              --cluster "${CLUSTER}" \
              --service-name "${SERVICE}" \
              --desired-status RUNNING \
              --query 'taskArns[0]' \
              --output text
          )"

          aws ecs execute-command \
            --cluster "${CLUSTER}" \
            --task "${TASK_ARN}" \
            --container moodle \
            --interactive \
            --command 'php admin/cli/cfg.php --name=release'

      - name: Write Upgrade Summary
        if: always()
        run: |
          {
            echo "## Moodle Version Upgrade"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | ${TARGET_ENVIRONMENT} |"
            echo "| Moodle tag | ${MOODLE_VERSION} |"
            echo "| Image tag | ${IMAGE_TAG} |"
            echo "| Moodle URL | ${MOODLE_WWWROOT:-unknown} |"
            echo "| Previous task definition | ${PREVIOUS_TASK_DEFINITION:-unknown} |"
            echo "| RDS snapshot | ${DB_SNAPSHOT:-not-created} |"
            echo "| EFS backup job | ${EFS_BACKUP_JOB_ID:-not-created} |"
            echo "| Backup vault | ${BACKUP_VAULT_NAME:-not-set} |"
            echo ""
            echo "Rollback through the Server Restore workflow with the previous task"
            echo "definition above. If Moodle CLI upgrade changed the database, restore"
            echo "the recorded RDS snapshot and EFS recovery point through the runbook."
          } >> "${GITHUB_STEP_SUMMARY}"
