services:
  moodle:
    container_name: ${COMPOSE_PROJECT_NAME:-elearn_mindset}_app
    build:
      context: .
      dockerfile: docker/moodle/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Kolkata}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    volumes:
      - ./moodle:/var/www/moodle:rw
      - ./moodledata:/var/www/moodledata:rw
    ports:
      - "127.0.0.1:${MOODLE_HTTP_PORT:-8080}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cron:
    container_name: ${COMPOSE_PROJECT_NAME:-elearn_mindset}_cron
    build:
      context: .
      dockerfile: docker/moodle/Dockerfile
    command: moodle-cron-loop
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Kolkata}
    depends_on:
      db:
        condition: service_healthy
      moodle:
        condition: service_started
    volumes:
      - ./moodle:/var/www/moodle:rw
      - ./moodledata:/var/www/moodledata:rw
    restart: unless-stopped

  db:
    container_name: ${COMPOSE_PROJECT_NAME:-elearn_mindset}_db
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moodle}
      POSTGRES_USER: ${POSTGRES_USER:-moodle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moodle_dev_password}
      TZ: ${TZ:-Asia/Kolkata}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5440}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    container_name: ${COMPOSE_PROJECT_NAME:-elearn_mindset}_redis
    image: redis:7-bookworm
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    container_name: ${COMPOSE_PROJECT_NAME:-elearn_mindset}_mailpit
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025

volumes:
  postgres_data:
  redis_data:
